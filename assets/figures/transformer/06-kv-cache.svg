<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">KV cache during autoregressive decoding</title>
  <desc id="desc">A clean three-step diagram showing prompt prefill, key-value cache, and incremental decoding.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="50%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#eefbf7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#172033" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M2 2 L11 6.5 L2 11 Z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .title { font-size: 34px; font-weight: 780; }
      .subtitle { font-size: 17px; fill: #637086; }
      .step { font-size: 18px; font-weight: 760; }
      .small { font-size: 14px; fill: #637086; }
      .tiny { font-size: 12px; fill: #637086; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; }
      .card { fill: #ffffff; stroke: #dce6f0; stroke-width: 1.4; filter: url(#shadow); }
      .inner { fill: #f8fbff; stroke: #dce6f0; stroke-width: 1.2; }
      .line { stroke: #334155; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .cell { stroke: #ffffff; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="40" fill="url(#bg)"/>
  <text x="72" y="76" class="title">KV cache makes generation incremental</text>
  <text x="72" y="110" class="subtitle">The model stores previous keys and values, then appends one new row per token.</text>

  <g transform="translate(90 170)">
    <rect width="300" height="370" rx="24" class="card"/>
    <text x="150" y="48" text-anchor="middle" class="step">1. Prefill prompt</text>
    <text x="150" y="78" text-anchor="middle" class="small">run the whole prompt once</text>
    <g transform="translate(40 126)">
      <rect width="50" height="42" rx="11" fill="#dbeafe" class="cell"/>
      <rect x="58" width="50" height="42" rx="11" fill="#dcfce7" class="cell"/>
      <rect x="116" width="50" height="42" rx="11" fill="#ffedd5" class="cell"/>
      <rect x="174" width="50" height="42" rx="11" fill="#f5d0fe" class="cell"/>
      <text x="25" y="27" text-anchor="middle" class="tiny">The</text>
      <text x="83" y="27" text-anchor="middle" class="tiny">cat</text>
      <text x="141" y="27" text-anchor="middle" class="tiny">sat</text>
      <text x="199" y="27" text-anchor="middle" class="tiny">on</text>
    </g>
    <rect x="58" y="236" width="184" height="70" rx="16" class="inner"/>
    <text x="150" y="266" text-anchor="middle" class="mono">compute Q, K, V</text>
    <text x="150" y="292" text-anchor="middle" class="small">for all prompt tokens</text>
  </g>

  <path d="M412 355 H456" class="line"/>

  <g transform="translate(475 145)">
    <rect width="250" height="420" rx="24" class="card"/>
    <text x="125" y="50" text-anchor="middle" class="step">2. Cache per layer</text>
    <text x="125" y="80" text-anchor="middle" class="small">store K and V tensors</text>
    <text x="44" y="128" class="mono">K cache</text>
    <g transform="translate(44 146)">
      <rect width="38" height="32" rx="8" fill="#bfdbfe" class="cell"/>
      <rect x="46" width="38" height="32" rx="8" fill="#93c5fd" class="cell"/>
      <rect x="92" width="38" height="32" rx="8" fill="#60a5fa" class="cell"/>
      <rect x="138" width="38" height="32" rx="8" fill="#3b82f6" class="cell"/>
      <rect y="42" width="38" height="32" rx="8" fill="#dbeafe" class="cell"/>
      <rect x="46" y="42" width="38" height="32" rx="8" fill="#bfdbfe" class="cell"/>
      <rect x="92" y="42" width="38" height="32" rx="8" fill="#93c5fd" class="cell"/>
      <rect x="138" y="42" width="38" height="32" rx="8" fill="#60a5fa" class="cell"/>
    </g>
    <text x="44" y="274" class="mono">V cache</text>
    <g transform="translate(44 292)">
      <rect width="38" height="32" rx="8" fill="#bbf7d0" class="cell"/>
      <rect x="46" width="38" height="32" rx="8" fill="#86efac" class="cell"/>
      <rect x="92" width="38" height="32" rx="8" fill="#4ade80" class="cell"/>
      <rect x="138" width="38" height="32" rx="8" fill="#22c55e" class="cell"/>
      <rect y="42" width="38" height="32" rx="8" fill="#dcfce7" class="cell"/>
      <rect x="46" y="42" width="38" height="32" rx="8" fill="#bbf7d0" class="cell"/>
      <rect x="92" y="42" width="38" height="32" rx="8" fill="#86efac" class="cell"/>
      <rect x="138" y="42" width="38" height="32" rx="8" fill="#4ade80" class="cell"/>
    </g>
    <text x="125" y="396" text-anchor="middle" class="tiny">tokens x heads x head_dim</text>
  </g>

  <path d="M747 355 H791" class="line"/>

  <g transform="translate(810 170)">
    <rect width="300" height="370" rx="24" class="card"/>
    <text x="150" y="48" text-anchor="middle" class="step">3. Decode next token</text>
    <text x="150" y="78" text-anchor="middle" class="small">compute only the newest step</text>
    <g transform="translate(48 126)">
      <rect width="58" height="46" rx="12" fill="#fde68a" class="cell"/>
      <text x="29" y="30" text-anchor="middle" class="tiny">mat</text>
      <path d="M78 23 H142" class="line"/>
      <rect x="158" width="58" height="46" rx="12" fill="#e0e7ff" class="cell"/>
      <text x="187" y="30" text-anchor="middle" class="tiny">.</text>
    </g>
    <rect x="58" y="236" width="184" height="70" rx="16" class="inner"/>
    <text x="150" y="265" text-anchor="middle" class="mono">query attends to</text>
    <text x="150" y="292" text-anchor="middle" class="small">cached K/V + new K/V</text>
  </g>

  <rect x="210" y="610" width="780" height="58" rx="18" fill="#ffffff" stroke="#dce6f0"/>
  <text x="600" y="637" text-anchor="middle" class="mono">With cache, generation appends one K/V row instead of recomputing old tokens.</text>
</svg>
